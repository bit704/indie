<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囚笼与玫瑰</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap');
        
        :root {
            --bg: #0a0709;
            --bg-panel: #151013;
            --bg-panel-2: #1f171c;
            --accent: #8b1e3f;
            --accent-light: #c73e5b;
            --accent-glow: rgba(199, 62, 91, 0.25);
            --gold: #d4af37;
            --gold-dim: #8a7a4a;
            --text: #f0e6e9;
            --text-muted: #9a8b91;
            --danger: #7a1028;
            --love: #c2185b;
            --escape: #2e7d32;
            --mystery: #5d3a8a;
            --border: rgba(212, 175, 55, 0.15);
            --shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            line-height: 1.8;
            background-image: 
                radial-gradient(circle at 20% 10%, rgba(139, 30, 63, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(93, 58, 138, 0.1) 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L37 23L60 30L37 37L30 60L23 37L0 30L23 23Z' fill='%23d4af37' fill-opacity='0.03'/%3E%3C/svg%3E");
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(21, 16, 19, 0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
            opacity: 0.6;
        }
        
        header { text-align: center; margin-bottom: 8px; position: relative; z-index: 1; }
        h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.8em;
            background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.15em;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.05em;
            letter-spacing: 0.1em;
            margin-top: 6px;
            font-style: italic;
        }
        .rose-divider {
            text-align: center;
            margin: 12px 0 22px;
            color: var(--accent-light);
            font-size: 1.2em;
            letter-spacing: 8px;
            opacity: 0.5;
        }
        
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px 8px 0 0;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95em;
        }
        .tab:hover {
            background: rgba(199, 62, 91, 0.1);
            color: var(--text);
            transform: translateY(-2px);
        }
        .tab.active {
            background: linear-gradient(180deg, rgba(139, 30, 63, 0.4), rgba(139, 30, 63, 0.15));
            border-color: var(--accent);
            color: var(--gold);
            font-weight: 600;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        
        .content { display: none; animation: fadeIn 0.6s ease; }
        .content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .panel {
            background: var(--bg-panel);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
        }
        .panel::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
            opacity: 0.3;
        }
        .panel-title {
            color: var(--gold);
            font-size: 1.15em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        .status-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status-label { color: var(--text-muted); font-size: 0.8em; letter-spacing: 0.05em; }
        .status-value { color: var(--gold); font-size: 1.3em; font-weight: 600; margin-top: 4px; }
        
        .story-display {
            min-height: 320px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 18px;
            font-size: 1.05em;
            line-height: 2;
        }
        .story-display::-webkit-scrollbar { width: 6px; }
        .story-display::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 3px; }
        .story-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
        .story-paragraph {
            margin-bottom: 16px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid var(--accent-light);
            border-radius: 0 10px 10px 0;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .story-paragraph.ai-generated { border-left-color: var(--mystery); background: rgba(93, 58, 138, 0.06); }
        .story-choice {
            margin-bottom: 16px;
            padding: 10px 14px;
            border-left: 3px solid var(--gold);
            border-radius: 0 10px 10px 0;
            background: rgba(212, 175, 55, 0.06);
            color: var(--gold);
            font-style: italic;
            animation: slideIn 0.5s ease;
        }
        .float-restart {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .float-restart:hover {
            background: rgba(199, 62, 91, 0.15);
            border-color: var(--accent-light);
            color: var(--accent-light);
            transform: rotate(0deg);
        }
        .float-restart::after {
            content: '重置游戏：清空存档并从头开始';
            position: absolute;
            top: 44px;
            right: 0;
            width: max-content;
            max-width: 180px;
            padding: 6px 10px;
            background: var(--bg-panel-2);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.8em;
            font-style: normal;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 20;
        }
        .float-restart:hover::after { opacity: 1; }
        .restart-icon {
            display: inline-block;
            transition: transform 0.6s ease;
        }
        .float-restart:hover .restart-icon { transform: rotate(360deg); }
        .story-speaker {
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .story-location {
            display: inline-block;
            background: rgba(139, 30, 63, 0.15);
            color: var(--accent-light);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .choice-btn {
            padding: 14px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.98em;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }
        .choice-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--accent-light);
            transition: width 0.25s ease;
        }
        .choice-btn:hover {
            background: rgba(199, 62, 91, 0.1);
            border-color: var(--accent-light);
            transform: translateX(4px);
        }
        .choice-btn:hover::before { width: 5px; }
        .choice-btn.escape { border-color: rgba(46, 125, 50, 0.3); }
        .choice-btn.escape::before { background: var(--escape); }
        .choice-btn.escape:hover { background: rgba(46, 125, 50, 0.08); }
        .choice-btn.love { border-color: rgba(194, 24, 89, 0.3); }
        .choice-btn.love::before { background: var(--love); }
        .choice-btn.love:hover { background: rgba(194, 24, 89, 0.08); }
        .choice-btn.investigate { border-color: rgba(93, 58, 138, 0.3); }
        .choice-btn.investigate::before { background: var(--mystery); }
        .choice-btn.investigate:hover { background: rgba(93, 58, 138, 0.08); }
        .choice-tag {
            display: inline-block;
            font-size: 0.7em;
            padding: 1px 6px;
            border-radius: 4px;
            margin-right: 6px;
            vertical-align: middle;
        }
        .tag-love { background: rgba(194, 24, 89, 0.2); color: var(--love); }
        .tag-escape { background: rgba(46, 125, 50, 0.2); color: #4caf50; }
        .tag-investigate { background: rgba(93, 58, 138, 0.2); color: #b388ff; }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .custom-input {
            flex: 1;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95em;
        }
        .custom-input:focus {
            outline: none;
            border-color: var(--accent-light);
            box-shadow: 0 0 12px var(--accent-glow);
        }
        
        button.action {
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95em;
        }
        button.action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(199, 62, 91, 0.35);
        }
        button.action:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        button.secondary {
            background: rgba(255,255,255,0.08);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.15);
        }
        button.secondary:hover { background: rgba(255,255,255,0.15); }
        button.danger { background: linear-gradient(135deg, #7a1028, #a51d3d); }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }
        .character-card {
            background: var(--bg-panel-2);
            border-radius: 14px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .character-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-color: rgba(199, 62, 91, 0.3);
        }
        .character-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(139, 30, 63, 0.15), transparent 70%);
            pointer-events: none;
        }
        .char-avatar {
            font-size: 3em;
            text-align: center;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2));
        }
        .char-name {
            text-align: center;
            font-size: 1.2em;
            color: var(--gold);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .char-role {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85em;
            margin-bottom: 14px;
        }
        .char-bio {
            font-size: 0.88em;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 14px;
            min-height: 60px;
        }
        .affection-bar {
            margin-top: 10px;
        }
        .affection-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .progress-track {
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .fill-love { background: linear-gradient(90deg, var(--love), #ff6b9d); }
        .fill-fear { background: linear-gradient(90deg, #5c0a1e, var(--danger)); }
        .fill-trust { background: linear-gradient(90deg, var(--escape), #81c784); }
        
        .clue-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
        }
        .clue-item {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
        }
        .clue-item:hover { border-color: var(--gold); transform: translateY(-2px); }
        .clue-item.undiscovered {
            opacity: 0.5;
            filter: grayscale(0.6);
        }
        .clue-title { color: var(--gold); font-weight: 600; margin-bottom: 6px; }
        .clue-desc { color: var(--text-muted); font-size: 0.9em; line-height: 1.6; }
        .clue-source { color: var(--accent-light); font-size: 0.8em; margin-top: 8px; font-style: italic; }
        
        .ending-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }
        .ending-card {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
        }
        .ending-card.unlocked { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .ending-card.locked { opacity: 0.5; }
        .ending-status {
            position: absolute;
            top: 12px; right: 12px;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .status-unlocked { background: var(--gold); color: var(--bg); font-weight: 600; }
        .status-locked { background: rgba(255,255,255,0.1); color: var(--text-muted); }
        .ending-title { color: var(--gold); font-size: 1.1em; margin-bottom: 8px; font-weight: 600; }
        .ending-desc { color: var(--text-muted); font-size: 0.9em; line-height: 1.6; margin-bottom: 10px; }
        .ending-condition { color: var(--accent-light); font-size: 0.8em; font-style: italic; }
        
        .control-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        
        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 14px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.82em;
            line-height: 1.6;
        }
        .log-entry {
            margin: 4px 0;
            padding: 4px 8px;
            border-left: 2px solid var(--gold);
        }
        .log-entry.error { border-left-color: var(--danger); color: #ff8a9a; }
        .log-entry.success { border-left-color: var(--escape); color: #a5d6a7; }
        .log-entry.ai { border-left-color: var(--mystery); color: #b388ff; }
        
        .settings-group {
            margin-bottom: 20px;
        }
        .settings-group label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-size: 0.9em;
        }
        .settings-group input, .settings-group select, .settings-group textarea {
            width: 100%;
            max-width: 400px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95em;
        }
        .settings-group input:focus, .settings-group select:focus, .settings-group textarea:focus {
            outline: none;
            border-color: var(--accent-light);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            animation: modalIn 0.5s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.8em;
            color: var(--gold);
            margin-bottom: 16px;
        }
        .modal-text {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 24px;
            font-size: 1.05em;
        }
        
        .hint-text {
            color: var(--text-muted);
            font-size: 0.85em;
            margin-top: 12px;
            font-style: italic;
        }
        
        @media (max-width: 640px) {
            h1 { font-size: 2em; }
            .container { padding: 18px; }
            .story-display { max-height: 400px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>囚笼与玫瑰</h1>
        <div class="rose-divider">🥀 🥀 🥀 🥀 🥀</div>
        <div class="subtitle" id="subtitle">他们在黑暗中等你，而你只想逃出去</div>
    </header>

    <nav class="tabs" id="tab-bar">
        <button class="tab active" data-tab="story">🥀 故事</button>
        <button class="tab" data-tab="characters">🎭 角色</button>
        <button class="tab" data-tab="clues">🔍 线索</button>
        <button class="tab" data-tab="endings">🌙 结局</button>
        <button class="tab" data-tab="settings">⚙️ AI设置</button>
    </nav>

    <div id="story" class="content active"></div>
    <div id="characters" class="content"></div>
    <div id="clues" class="content"></div>
    <div id="endings" class="content"></div>
    <div id="settings" class="content"></div>
</div>

<div class="modal-overlay" id="ending-modal">
    <div class="modal">
        <div class="modal-title" id="modal-title">结局</div>
        <div class="modal-text" id="modal-text"></div>
        <div class="control-row" style="justify-content: center;">
            <button class="action" onclick="restartGame()">重新开始</button>
            <button class="action secondary" onclick="closeModal()">继续浏览</button>
        </div>
    </div>
</div>

<script>
// ============================================================
//  游戏核心数据
// ============================================================
const DEFAULT_DATA = {
    _version: 1,
    day: 1,
    hour: 8,
    location: 'bedroom',
    alertLevel: 0, // 0-100, 越高越难行动
    escapeProgress: 0, // 0-100
    discoveredClues: [],
    unlockedEndings: [],
    flags: {},
    storyLog: [],
    currentScene: 'prologue',
    aiMode: false,
    apiKey: '',
    model: 'deepseek-chat',
    customHistory: [], // 用于AI上下文的最近剧情摘要
    
    characters: {
        shenmo: { name: '沈墨', role: '庄园主人', avatar: '🎩', affection: 0, fear: 30, trust: 0,

// ============================================================
//  工具函数
// ============================================================
function extractJSON(text) {
    let match = text.match(/```(?:json)?\s*\n?([\s\S]*?)\n?\s*```/);
    if (match) return match[1].trim();
    match = text.match(/\{[\s\S]*\}/);
    if (match) return match[0].trim();
    return text.trim();
}

function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

function affectionHighest() {
    let max = 0;
    for (const key of Object.keys(gameData.characters)) {
        max = Math.max(max, gameData.characters[key].affection);
    }
    return max;
}

function getMostLoved() {
    let max = -1, name = '';
    for (const key of Object.keys(gameData.characters)) {
        if (gameData.characters[key].affection > max) {
            max = gameData.characters[key].affection;
            name = key;
        }
    }
    return name;
}

function timeString() {
    const h = gameData.hour;
    const label = h < 6 ? '凌晨' : h < 12 ? '上午' : h < 18 ? '下午' : '夜晚';
    return `第 ${gameData.day} 天 · ${label} ${h}:00`;
}

function evalCondition(condition) {
    if (!condition) return true;
    try {
        return new Function('gameData', 'characters', 'return ' + condition)(gameData, gameData.characters);
    } catch (e) { return false; }
}

function updateClues() {
    let changed = false;
    for (const clue of gameData.allClues) {
        if (gameData.discoveredClues.includes(clue.id)) continue;
        if (evalCondition(clue.condition)) {
            gameData.discoveredClues.push(clue.id);
            addLog(`🔍 发现线索：${clue.title}`, 'ai');
            changed = true;
        }
    }
    if (changed) saveGallery();
}

function checkEndings() {
    let changed = false;
    for (const ending of gameData.allEndings) {
        if (ending.unlocked) continue;
        if (evalCondition(ending.condition)) {
            ending.unlocked = true;
            gameData.unlockedEndings.push(ending.id);
            addLog(`🌙 解锁结局：${ending.title}`, 'success');
            changed = true;
        }
    }
    if (changed) saveGallery();
    
    // 触发即时结局
    if (gameData.alertLevel >= 100) return triggerEnding('bad_end');
    
    // 特殊地点/事件触发
    if (gameData.flags.in_tunnel && gameData.escapeProgress >= 80) return triggerEnding('escape_alone');
    if (gameData.flags.surrendered_to_shenmo) return triggerEnding('shenmo_lover');
    if (gameData.flags.left_with_yechen) return triggerEnding('yechen_deal');
    if (gameData.flags.luxiao_helped_escape) return triggerEnding('luxiao_betrayal');
    if (gameData.flags.baiche_called_police) return triggerEnding('baiche_redemption');
    if (gameData.flags.submitted_evidence) return triggerEnding('truth_exposed');
    if (gameData.day >= 15 && gameData.escapeProgress < 30 && affectionHighest() < 50) return triggerEnding('give_up');
    
    return false;
}

function triggerEnding(endingId) {
    const ending = gameData.allEndings.find(e => e.id === endingId);
    if (!ending) return false;
    if (!ending.unlocked) {
        ending.unlocked = true;
        gameData.unlockedEndings.push(endingId);
        saveGallery();
    }
    document.getElementById('modal-title').textContent = '结局：' + ending.title;
    document.getElementById('modal-text').innerHTML = `<div style="font-size:1.3em; margin-bottom:16px;">${endingDescEmoji(endingId)}</div>${ending.desc}<br><br><em style="color:var(--gold);">—— 故事到此结束，但玫瑰永远盛开 ——</em>`;
    document.getElementById('ending-modal').classList.add('active');
    renderEndings();
    saveGame();
    return true;
}

function endingDescEmoji(id) {
    const map = { 'escape_alone': '🌅', 'shenmo_lover': '🥀', 'yechen_deal': '🍷', 'luxiao_betrayal': '🌧️', 'baiche_redemption': '💊', 'truth_exposed': '📰', 'give_up': '🕯️', 'bad_end': '⚰️' };
    return map[id] || '🌙';
}

function closeModal() { document.getElementById('ending-modal').classList.remove('active'); }

function restartGame() {
    const apiKey = gameData.apiKey;
    const aiMode = gameData.aiMode;
    const model = gameData.model;
    localStorage.removeItem(STORAGE_KEY);
    gameData = clone(DEFAULT_DATA);
    gameData.apiKey = apiKey;
    gameData.aiMode = aiMode;
    gameData.model = model;
    loadGallery();
    closeModal();
    renderAll();
    advanceScene('prologue');
    addLog('游戏已重置', 'success');
}

    renderStory();
    renderCharacters();
    renderClues();
    renderEndings();
    renderSettings();
    updateSubtitle();
}

function updateSubtitle() {
    const loved = getMostLoved();
    let hint = '';
    if (loved) {
        const char = gameData.characters[loved];
        if (char.affection >= 60) hint = ` · ${char.name} 似乎对你动了真心`;
    }
    document.getElementById('subtitle').textContent = `${timeString()} · ${locationName(gameData.location)} · 警戒 ${gameData.alertLevel}%${hint}`;
}

function locationName(loc) {
    const map = { 'bedroom': '卧室', 'hallway': '走廊', 'living_room': '客厅', 'study': '书房', 'cellar': '酒窖', 'garden': '温室', 'kitchen': '厨房', 'garage': '车库', 'tunnel': '密道', 'forest': '松林' };
    return map[loc] || '庄园';
}

function renderStory() {
    const el = document.getElementById('story');
    el.innerHTML = `
        <div class="status-bar">
            <div class="status-item"><div class="status-label">时间</div><div class="status-value">${timeString()}</div></div>
            <div class="status-item"><div class="status-label">地点</div><div class="status-value">${locationName(gameData.location)}</div></div>
            <div class="status-item"><div class="status-label">逃跑进度</div><div class="status-value">${gameData.escapeProgress}%</div></div>
            <div class="status-item"><div class="status-label">警戒等级</div><div class="status-value" style="color:${gameData.alertLevel > 60 ? 'var(--danger)' : 'var(--gold)'}">${gameData.alertLevel}%</div></div>
        </div>
        <div class="panel">
            <div class="panel-title">🥀 剧情</div>
            <button class="float-restart" onclick="restartGame()" aria-label="重新开始"><span class="restart-icon">↻</span></button>
            <div class="story-display" id="story-display"></div>
            <div class="choices-grid" id="choices-grid"></div>
            <div class="input-row" id="custom-action-row" style="display:${gameData.aiMode ? 'flex' : 'none'}">
                <input type="text" class="custom-input" id="custom-action" placeholder="输入你的行动（例如：试图说服陆骁放我走）...">
                <button class="action" onclick="submitCustomAction()">行动</button>
            </div>
            <div class="hint-text">${gameData.aiMode ? 'AI 模式已开启：你既可以选择预设选项，也可以输入自定义行动。' : '本地模式：从预设选项中选择以推动剧情。在设置中开启 DeepSeek AI 可获得更自由的叙事体验。'}</div>
        </div>
    `;
    renderStoryLog();
    renderChoices();
}

function renderStoryLog() {
    const display = document.getElementById('story-display');
    if (!display) return;
    display.innerHTML = gameData.storyLog.map(p => {
        if (p.type === 'choice') {
            return `<div class="story-choice">🌹 你选择：${p.content}</div>`;
        }
        if (p.type === 'dialogue') {
            return `<div class="story-paragraph ${p.ai ? 'ai-generated' : ''}"><div class="story-speaker">${p.speaker}</div>${p.content}</div>`;
        }
        return `<div class="story-paragraph ${p.ai ? 'ai-generated' : ''}">${p.type === 'thought' ? '<em style="color:var(--text-muted);">（' + p.content + '）</em>' : p.content}</div>`;
    }).join('');
    display.scrollTop = display.scrollHeight;
}

function renderChoices() {
    const grid = document.getElementById('choices-grid');
    if (!grid) return;
    grid.innerHTML = currentChoices.map((c, i) => `
        <button class="choice-btn ${c.type}" onclick="choose(${i})">
            <span class="choice-tag tag-${c.type}">${typeLabel(c.type)}</span>
            ${c.text}
            ${c.note ? `<span style="color:var(--text-muted);font-size:0.8em;margin-left:8px;">(${c.note})</span>` : ''}
        </button>
    `).join('');
}

function typeLabel(t) {
    return { 'love': '攻略', 'escape': '逃脱', 'investigate': '探索' }[t] || '行动';
}

function renderCharacters() {
    const el = document.getElementById('characters');
    const cards = Object.entries(gameData.characters).map(([key, c]) => `
        <div class="character-card">
            <div class="char-avatar">${c.avatar}</div>
            <div class="char-name">${c.name}</div>
            <div class="char-role">${c.role}</div>
            <div class="char-bio">${c.bio}</div>
            <div class="affection-bar">
                <div class="affection-label"><span>好感</span><span>${c.affection}%</span></div>
                <div class="progress-track"><div class="progress-fill fill-love" style="width:${c.affection}%"></div></div>
            </div>
            <div class="affection-bar">
                <div class="affection-label"><span>恐惧</span><span>${c.fear}%</span></div>
                <div class="progress-track"><div class="progress-fill fill-fear" style="width:${c.fear}%"></div></div>
            </div>
            <div class="affection-bar">
                <div class="affection-label"><span>信任</span><span>${c.trust}%</span></div>
                <div class="progress-track"><div class="progress-fill fill-trust" style="width:${c.trust}%"></div></div>
            </div>
        </div>
    `).join('');
    el.innerHTML = `<div class="panel"><div class="panel-title">🎭 可攻略角色</div><div class="character-grid">${cards}</div></div>`;
}

function renderClues() {
    const el = document.getElementById('clues');
    const items = gameData.allClues.map(clue => {
        const found = gameData.discoveredClues.includes(clue.id);
        return `
            <div class="clue-item ${found ? '' : 'undiscovered'}">
                <div class="clue-title">${found ? clue.title : '???'}</div>
                <div class="clue-desc">${found ? clue.desc : '尚未发现这条线索。继续探索庄园与角色互动吧。'}</div>
                ${found ? `<div class="clue-source">来源：${clue.source}</div>` : ''}
            </div>
        `;
    }).join('');
    el.innerHTML = `<div class="panel"><div class="panel-title">🔍 已收集线索（${gameData.discoveredClues.length} / ${gameData.allClues.length}）</div><div class="clue-list">${items}</div></div>`;
}

function renderEndings() {
    const el = document.getElementById('endings');
    const cards = gameData.allEndings.map(e => `
        <div class="ending-card ${e.unlocked ? 'unlocked' : 'locked'}">
            <div class="ending-status ${e.unlocked ? 'status-unlocked' : 'status-locked'}">${e.unlocked ? '已解锁' : '未解锁'}</div>
            <div class="ending-title">${endingDescEmoji(e.id)} ${e.title}</div>
            <div class="ending-desc">${e.unlocked ? e.desc : '达成特定条件后解锁。'}</div>
            <div class="ending-condition">${e.unlocked ? '已达成' : '条件：' + simplifyCondition(e.condition)}</div>
        </div>
    `).join('');
    el.innerHTML = `<div class="panel"><div class="panel-title">🌙 结局图鉴（${gameData.unlockedEndings.length} / ${gameData.allEndings.length}）</div><div class="ending-list">${cards}</div></div>`;
}

function simplifyCondition(c) {
    return c.replace(/characters\.(\w+)\.affection/g, (m, k) => gameData.characters[k].name + '好感')
            .replace(/characters\.(\w+)\.trust/g, (m, k) => gameData.characters[k].name + '信任')
            .replace(/escapeProgress/g, '逃跑进度')
            .replace(/alertLevel/g, '警戒等级')
            .replace(/discoveredClues\.length/g, '收集线索')
            .replace(/flags\./g, '事件')
            .replace(/>=/g, '≥').replace(/<=/g, '≤').replace(/&&/g, '且');
}

function renderSettings() {
    const el = document.getElementById('settings');
    el.innerHTML = `
        <div class="panel">
            <div class="panel-title">⚙️ AI 设置</div>
            <div class="settings-group">
                <label>DeepSeek API Key</label>
                <input type="password" id="api-key" value="${gameData.apiKey}" placeholder="sk-...">

                <label>模型选择</label>

    const log = document.getElementById('system-log');

//  存档 / 读档 / 重置
// ============================================================
const STORAGE_KEY = 'cage-rose-save';
const GALLERY_KEY = 'cage-rose-gallery';
const DATA_VERSION = 1;

function saveGallery() {
    try {
        const gallery = {
            unlockedEndings: gameData.unlockedEndings,
            discoveredClues: gameData.discoveredClues
        };
        localStorage.setItem(GALLERY_KEY, JSON.stringify(gallery));
    } catch (e) { console.error('Gallery save failed', e); }
}

function loadGallery() {
    try {
        const saved = JSON.parse(localStorage.getItem(GALLERY_KEY) || '{}');
        if (saved.unlockedEndings) {
            gameData.unlockedEndings = new Set([...gameData.unlockedEndings, ...saved.unlockedEndings]);
        }
        if (saved.discoveredClues) {
            gameData.discoveredClues = [...new Set([...gameData.discoveredClues, ...saved.discoveredClues])];
        }
    } catch (e) { console.error('Gallery load failed', e); }
}

function saveGame() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameData));
        saveGallery();
        addLog('💾 游戏已存档', 'success');
    } catch (e) { addLog('存档失败：' + e.message, 'error'); }
}

function loadGame() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) { alert('没有找到存档'); return; }
        gameData = ensureCompatibility(JSON.parse(saved));
        loadGallery();
        addLog('📂 存档已加载', 'success');
        renderAll();
        const scene = SCENES[gameData.currentScene];
        currentChoices = scene ? scene.choices : [];
        renderChoices();
    } catch (e) { alert('读档失败：' + e.message); }
}

function ensureCompatibility(data) {
    const base = clone(DEFAULT_DATA);
    // 递归浅合并，保留数组用默认值兜底
    const merged = deepMerge(base, data);
    merged.allClues = base.allClues;
    merged.allEndings = base.allEndings.map(e => {
        const saved = (data.allEndings || []).find(x => x.id === e.id);
        return saved ? { ...e, ...saved } : e;
    });
    if (!Array.isArray(merged.discoveredClues)) merged.discoveredClues = [];
    if (!Array.isArray(merged.unlockedEndings)) merged.unlockedEndings = [];
    if (!Array.isArray(merged.storyLog)) merged.storyLog = [];
    if (!Array.isArray(merged.customHistory)) merged.customHistory = [];
    if (!Array.isArray(merged.systemLog)) merged.systemLog = [];
    return merged;
}

function deepMerge(base, override) {
    if (override === null) return base;
    if (Array.isArray(base) && Array.isArray(override)) return override;
    if (typeof base === 'object' && typeof override === 'object') {
        const res = { ...base };
        for (const k of Object.keys(override)) {
            res[k] = deepMerge(base[k], override[k]);
        }
        return res;
    }
    return override;
}

document.getElementById('tab-bar').addEventListener('click', e => {
    if (!e.target.classList.contains('tab')) return;
    const tab = e.target.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById(tab).classList.add('active');
    if (tab === 'story') renderStory();
    if (tab === 'characters') renderCharacters();
    if (tab === 'clues') renderClues();
    if (tab === 'endings') renderEndings();
    if (tab === 'settings') renderSettings();
});

// ============================================================
//  剧情推进
// ============================================================
function advanceScene(sceneId) {
    if (_isAdvancingScene) {
        // 记录重入调用并入队，稍后处理最新的请求
        addLog('重复调用 advanceScene，已入队：' + sceneId, 'warning');
        _sceneQueue.push(sceneId);
        return;
    }
    _isAdvancingScene = true;
    if (ENDING_SCENE_MAP[sceneId]) {
        triggerEnding(ENDING_SCENE_MAP[sceneId]);
        _isAdvancingScene = false;
        return;
    }
    
    gameData.currentScene = sceneId;
    const scene = SCENES[sceneId];
    if (!scene) {
        addLog('场景未找到：' + sceneId, 'error');
        _isAdvancingScene = false;
        return;
    }
    if (!Array.isArray(scene.text)) {
        addLog('场景格式错误（缺少 text 数组）：' + sceneId, 'error');
        _isAdvancingScene = false;
        return;
    }
    
    for (const p of scene.text) {
        gameData.storyLog.push({ ...p, ai: false });
    }
    currentChoices = scene.choices;
    
    updateClues();
    renderStory();
    saveGame();
    if (checkEndings()) { _isAdvancingScene = false; return; }
    _isAdvancingScene = false;
    // 处理队列中下一个待执行场景（如果有），按先进先出顺序执行
    if (_sceneQueue.length > 0) {
        const next = _sceneQueue.shift();
        // 使用短延迟来避免深度同步调用造成的栈问题
        setTimeout(() => advanceScene(next), 0);
    }
}

function choose(index) {
    const choice = currentChoices[index];
    if (!choice) return;
    gameData.storyLog.push({ type: 'choice', content: choice.text, ai: false });
    applyEffects(choice.effects || {});
    advanceTime(choice.advanceTime || 1);
    if (choice.scene) advanceScene(choice.scene);
    renderAll();
}

function applyEffects(effects) {
    if (effects.characters) {
        for (const [char, deltas] of Object.entries(effects.characters)) {
            if (!gameData.characters[char]) continue;
            for (const [stat, delta] of Object.entries(deltas)) {
                if (gameData.characters[char][stat] !== undefined) {
                    gameData.characters[char][stat] = clamp(gameData.characters[char][stat] + delta, 0, 100);
                }
            }
        }
    }
    if (effects.escapeProgress) gameData.escapeProgress = clamp(gameData.escapeProgress + effects.escapeProgress, 0, 100);
    if (effects.alertLevel) gameData.alertLevel = clamp(gameData.alertLevel + effects.alertLevel, 0, 100);
    if (effects.flags) {
        for (const [k, v] of Object.entries(effects.flags)) gameData.flags[k] = v;
    }
}

function advanceTime(hours) {
    gameData.hour += hours;
    while (gameData.hour >= 24) {
        gameData.hour -= 24;
        gameData.day++;
    }
}

function toggleAIMode() {
    const key = document.getElementById('api-key').value.trim();
    const model = document.getElementById('model-select').value;
    gameData.apiKey = key;
    gameData.model = model;
    if (!gameData.aiMode && !key) {
        alert('请先填写 DeepSeek API Key');
        return;
    }
    gameData.aiMode = !gameData.aiMode;
    addLog(gameData.aiMode ? '🤖 AI 模式已开启' : '📖 已切换到本地剧情模式', 'ai');
    // 切换 AI 模式后实时刷新所有面板，确保设置页按钮文本和故事面板同时更新
    renderAll();
    saveGame();
}

async function submitCustomAction() {
    const input = document.getElementById('custom-action');
    const action = input.value.trim();
    if (!action) return;
    input.value = '';
    
    gameData.storyLog.push({ type: 'narration', content: `【你的行动】${action}`, ai: true });
    renderStoryLog();
    
    if (gameData.aiMode && gameData.apiKey) {
        await runAIStory(action);
    } else {
        // 本地模拟：根据关键词给出简短反应
        runLocalReaction(action);
    }
    renderAll();
}

function runLocalReaction(action) {
    const lowered = action.toLowerCase();
    let response = '你尝试这样做，但周围似乎没有什么变化。';
    let effects = {};
    
    if (lowered.includes('逃') || lowered.includes('跑') || lowered.includes('窗')) {
        response = '你寻找逃跑的机会，但庄园的安保比你想象的严密。不过你注意到一些之前忽略的细节。';
        effects = { escapeProgress: 5, alertLevel: 5 };
    } else if (lowered.includes('沈墨') || lowered.includes('墨')) {
        response = '你提到沈墨时，空气中仿佛有什么东西凝固了一瞬。';
        effects = { characters: { shenmo: { affection: 5 } } };
    } else if (lowered.includes('顾') || lowered.includes('夜辰')) {
        response = '顾夜辰如果听到你的名字从他唇间说出，大概会笑得很开心。';
        effects = { characters: { guyechen: { affection: 5 } } };
    } else if (lowered.includes('陆骁') || lowered.includes('骁')) {
        response = '陆骁在走廊尽头看了你一眼，什么也没说。';
        effects = { characters: { luxiao: { affection: 3 } } };
    } else if (lowered.includes('白澈') || lowered.includes('澈')) {
        response = '白澈轻轻叹了口气，像是在担心你。';
        effects = { characters: { baiche: { affection: 5 } } };
    } else if (lowered.includes('钥匙') || lowered.includes('保险柜') || lowered.includes('书房')) {
        response = '你回忆起关于万能钥匙和保险柜的线索。';
        effects = { flags: { saw_keys: true }, escapeProgress: 5 };
    } else if (lowered.includes('酒窖') || lowered.includes('密道')) {
        response = '酒窖深处似乎有什么在等待着你。';
        effects = { flags: { explored_cellar: true }, escapeProgress: 10 };
    }
    
    applyEffects(effects);
    gameData.storyLog.push({ type: 'narration', content: response, ai: true });
    advanceTime(1);
    updateClues();
    checkEndings();
}

async function runAIStory(action) {
    const btn = document.querySelector('#custom-action-row button');
    if (btn) { btn.disabled = true; btn.textContent = 'AI 生成中...'; }
    addLog('🤖 请求 DeepSeek 生成剧情...', 'ai');
    
    const state = buildStateSummary();
    const prompt = buildAIPrompt(action, state);
    
    try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${gameData.apiKey}`
            },
            body: JSON.stringify({
                model: gameData.model,
                messages: [
                    { role: 'system', content: buildSystemPrompt() },
                    { role: 'user', content: prompt }
                ],
                temperature: 0.85,
                max_tokens: 2000
            })
        });
        
        if (!response.ok) {
            const err = await response.text();
            throw new Error(`API ${response.status}: ${err}`);
        }
        
        const data = await response.json();
        const raw = data.choices[0].message.content;
        const jsonStr = extractJSON(raw);
        let result;
        try { result = JSON.parse(jsonStr); }
        catch (e) {
            addLog('AI 返回格式异常，尝试按文本解析', 'error');
            result = { narrative: raw, location: gameData.location, hourAdvance: 1, effects: {}, choices: [] };
        }
        
        // 应用 AI 返回的效果
        if (result.effects) applyEffects(result.effects);
        if (result.hourAdvance) advanceTime(result.hourAdvance);
        if (result.location) gameData.location = result.location;
        
        // 加入剧情
        if (result.narrative) {
            gameData.storyLog.push({ type: 'narration', content: result.narrative, ai: true });
        }
        if (result.dialogue) {
            for (const d of result.dialogue) {
                gameData.storyLog.push({ type: 'dialogue', speaker: d.speaker, content: d.content, ai: true });
            }
        }
        
        // 更新自定义选项
        if (result.choices && result.choices.length > 0) {
            currentChoices = result.choices.map(c => ({
                text: c.text,
                type: c.type || 'investigate',
                scene: c.scene || null,
                effects: c.effects || {},
                note: c.note || 'AI生成',
                advanceTime: c.advanceTime || 1,
                ai: true
            }));
        } else {
            currentChoices = [
                { text: '继续观察当前处境', type: 'investigate', scene: null, effects: {}, advanceTime: 1 },
                { text: '尝试寻找逃脱机会', type: 'escape', scene: null, effects: { escapeProgress: 5, alertLevel: 5 }, advanceTime: 1 },
                { text: '与在场的人交谈', type: 'love', scene: null, effects: { characters: { [getMostLoved() || 'shenmo']: { affection: 5 } } }, advanceTime: 1 }
            ];
        }
        
        // 保存 AI 剧情摘要
        gameData.customHistory.push({ action, summary: result.narrative ? result.narrative.substring(0, 200) : '' });
        if (gameData.customHistory.length > 10) gameData.customHistory.shift();
        
        addLog('✅ AI 剧情生成完成', 'success');
        updateClues();
        checkEndings();
        renderStory();
        saveGame();
    } catch (error) {
        addLog('❌ AI 生成失败：' + error.message, 'error');
        addLog('已回退到本地模拟', 'error');
        runLocalReaction(action);
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = '行动'; }
    }
}

function buildSystemPrompt() {
    return `你是一款乙女文字冒险游戏的 AI 叙事引擎。游戏背景：女主被四名男性角色绑架到一座偏远庄园，她需要想办法逃脱，也可以攻略其中任何一人，触发不同结局。

角色：
- 沈墨：庄园主人，冷静、控制欲强、有心理创伤（妹妹失踪）。
- 顾夜辰：谈判专家，风流、危险、擅长蛊惑人心。
- 陆骁：安保主管，沉默的前特种兵，内心有愧疚。
- 白澈：随行医生，年轻温和，最易动摇。

规则：
1. 文风：哥特浪漫、悬疑、带点病态美感。中文叙述，第二人称或第三人称（以女主视角）。
2. 保持角色性格一致性。
3. 情节可以包含情感张力、暗示、轻微暧昧，但禁止色情或过度暴力。
4. 返回严格 JSON，包含：narrative（剧情段落，200-400字）、dialogue（可选，对话数组）、location（可选，新地点）、hourAdvance（时间推进小时数）、effects（对角色好感/恐惧/信任、escapeProgress、alertLevel的影响，参考 applyEffects 格式）、choices（3个选项，每个含 text/type/.effects/note）。
5. 如果用户行动会导致某个结局，在 effects 中设置对应 flags，如 surrendered_to_shenmo、left_with_yechen、luxiao_helped_escape、baiche_called_police、submitted_evidence、in_tunnel。`;
}

function buildAIPrompt(action, state) {
    const history = gameData.customHistory.map(h => `- 行动：${h.action}\n  摘要：${h.summary}`).join('\n');
    return `当前游戏状态：
${JSON.stringify(state, null, 2)}

最近剧情摘要：
${history || '无'}

玩家输入的自定义行动：
"""${action}"""

请根据当前状态、角色关系和玩家行动，生成下一段剧情。必须返回 JSON 格式。`;
}

function buildStateSummary() {
    const chars = {};
    for (const [k, c] of Object.entries(gameData.characters)) {
        chars[k] = { name: c.name, affection: c.affection, fear: c.fear, trust: c.trust };
    }
    return {
        day: gameData.day,
        hour: gameData.hour,
        location: gameData.location,
        alertLevel: gameData.alertLevel,
        escapeProgress: gameData.escapeProgress,
        discoveredClues: gameData.discoveredClues,
        flags: gameData.flags,
        characters: chars
    };
}

// ============================================================
//  日志
// ============================================================
function addLog(msg, type = 'info') {
    if (!gameData.systemLog) gameData.systemLog = [];
    const now = timeString();
    gameData.systemLog.push({ time: now, msg, type });
    const logEl = document.getElementById('system-log');
    if (logEl) {
        const cls = type === 'error' ? 'error' : type === 'success' ? 'success' : type === 'ai' ? 'ai' : '';
        logEl.innerHTML += `<div class="log-entry ${cls}">[${now}] ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }
}

// ============================================================
//  初始化
// ============================================================
(function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const raw = JSON.parse(saved);
            if (!raw._version || raw._version < DATA_VERSION) {
                localStorage.removeItem(STORAGE_KEY);
                gameData = clone(DEFAULT_DATA);
            } else {
                gameData = ensureCompatibility(raw);
            }
        } catch (e) {
            gameData = clone(DEFAULT_DATA);
        }
    } else {
        gameData = clone(DEFAULT_DATA);
    }
    renderAll();
    if (gameData.storyLog.length === 0) {
        advanceScene('prologue');
    } else {
        const scene = SCENES[gameData.currentScene];
        currentChoices = scene ? scene.choices : [];
        renderChoices();
    }
})();
</script>
