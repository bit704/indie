//  工具函数

// 从DeepSeek返回的文本中提取JSON（剥离markdown标记）
function extractJSON(text) {
    // 尝试剥离 ```json ... ``` 包裹
    let match = text.match(/```(?:json)?\s*\n?([\s\S]*?)\n?\s*```/);
    if (match) return match[1].trim();
    // 尝试直接找 JSON 对象（以 { 开头）
    match = text.match(/\{[\s\S]*\}/);
    if (match) return match[0].trim();
    return text.trim();
}

// 更新游戏数据 — 核心函数，支持数组按name匹配更新+新增
function applyUpdate(target, source) {
    if (Array.isArray(source)) {
        if (!Array.isArray(target)) {
            // 目标不是数组，直接替换
            return source;
        }
        // 数组：按 name 字段匹配，找不到则新增
        const result = [...target];
        for (const item of source) {
            if (item && item.name !== undefined) {
                const idx = result.findIndex(r => r.name === item.name);
                if (idx >= 0) {
                    // 找到同名条目 → 逐字段更新
                    result[idx] = applyUpdate(result[idx], item);
                } else {
                    // 新条目 → 添加到数组
                    result.push(item);
                }
            } else if (item && item.position !== undefined) {
                const idx = result.findIndex(r => r.position === item.position);
                if (idx >= 0) {
                    result[idx] = applyUpdate(result[idx], item);
                } else {
                    result.push(item);
                }
            } else {
                // 无 name 字段的数组条目，按索引覆盖
                const idx = source.indexOf(item);
                if (idx < result.length) {
                    result[idx] = applyUpdate(result[idx], item);
                } else {
                    result.push(item);
                }
            }
        }
        return result;
    }

    if (source && typeof source === 'object' && !Array.isArray(source)) {
        if (!target || typeof target !== 'object') {
            return source; // 目标不存在或类型不同，直接替换
        }
        const result = { ...target };
        for (const key of Object.keys(source)) {
            if (source[key] === null) {
                // null 表示删除该字段
                delete result[key];
            } else if (source[key] === 'DELETE_ITEM') {
                // 特殊标记：从数组中删除某个条目（需配合name）
                delete result[key];
            } else {
                result[key] = applyUpdate(result[key], source[key]);
            }
        }
        return result;
    }

    // 基本类型（数字、字符串等）直接替换
    return source;
}

                <input type="password" id="api-key" placeholder="输入API密钥" style="width:300px;">
                <button onclick="toggleAIMode()" class="secondary" style="padding:8px 16px;font-size:0.9em;">切换模式</button>
            </div>
            <p style="color:#888;font-size:0.85em;">填写API Key后切换即可启用DeepSeek智能推演</p></div>
    `;
}

document.getElementById('tab-bar').addEventListener('click', e => {

// ============================================================
//  推演核心
// ============================================================

async function runSimulation() {
    const decree = document.getElementById('imperial-decree').value.trim();
    const period = document.getElementById('sim-period').value;
    const apiKey = document.getElementById('api-key').value.trim();

    if (!decree) { alert('请输入陛下指令！'); return; }

    const btn = document.getElementById('simulate-btn');
    btn.disabled = true;
    btn.textContent = '推演中...';

    addLog(`陛下指令：${decree}`);
    addLog(`推演周期：${period === 'half-month' ? '每半月' : '每三个月'}`);

    try {
        if (apiKey) {
            await runAISimulation(decree, period, apiKey);
        } else {
            await runLocalSimulation(decree, period);
        }
    } catch (error) {
        addLog(`推演出错：${error.message}`, 'error');
    }

    btn.disabled = false;
    btn.textContent = '开始推演';
    document.getElementById('imperial-decree').value = '';

    // 推演完毕后全量刷新页面
    renderAllPages();
    saveGame(); // 自动存档
}

// ============================================================
//  本地模拟推演（无API Key时的简易模式）
// ============================================================
async function runLocalSimulation(decree, period) {
    addLog('⚠️ 使用本地模拟推演（建议配置DeepSeek API获得智能推演）');

    await new Promise(r => setTimeout(r, 800));

    // 简易关键词匹配
    const d = decree.toLowerCase();

    if (d.includes('调动') || d.includes('进攻') || d.includes('防御') || d.includes('演习')) {
        addLog('检测到军事指令，小幅提升相关部队训练度');
        gameData.army.units.forEach(u => {
            u.training = Math.min(u.training + 0.02, u.name === '亮剑方面军' ? 3.5 : u.equipment.includes('装甲') ? 3.0 : 2.5);
            u.power = Math.round(u.troops * u.firepower * u.morale * u.training);
        });
        gameData.army.totalPower = gameData.army.units.reduce((s, u) => s + u.power, 0);
    }

    if (d.includes('税收') || d.includes('拨款') || d.includes('预算') || d.includes('财政')) {
        addLog('检测到财政指令，小幅调整收支');
        gameData.finance.monthlyIncome = Math.round(gameData.finance.monthlyIncome * 1.01);
        gameData.finance.monthlySurplus = gameData.finance.monthlyIncome - gameData.finance.monthlyExpense;
    }

    if (d.includes('建设') || d.includes('建造') || d.includes('开工') || d.includes('修建')) {
        addLog('检测到建设指令，推进项目进度');
        gameData.projects.forEach(p => {
            if (p.progress < 1) p.progress = Math.min(p.progress + 0.05, 1);
        });
    }

    // 更新日期
    advanceDate(period);
    addLog(`本地模拟推演完成，当前日期：${gameData.date}`, 'success');
}

// ============================================================
//  构建推演状态摘要 — 精简版，只传关键数据给DeepSeek
// ============================================================
function buildStateSummary() {
    const g = gameData;
    return {
        date: g.date,
        period: g.period,
        government: g.government.map(x => ({ position: x.position, name: x.name })),
        internal: {
            railways: g.internal.railways.map(x => ({ name: x.name, status: x.status, progress: x.progress, detail: x.detail })),
            highways: g.internal.highways.map(x => ({ name: x.name, status: x.status, progress: x.progress || 0, detail: x.detail || '' })),
            steel: g.internal.steel,
            oil: g.internal.oil,
            power: g.internal.power,
            automobiles: { annual: g.internal.automobiles.annual },
            taiwan: g.internal.taiwan
        },
        army: {
            totalTroops: g.army.totalTroops,
            totalPower: g.army.totalPower,
            armoredVehicles: g.army.armoredVehicles,
            heavyTanks: g.army.heavyTanks,
            airForce: { planes: g.army.airForce.planes, albatross: g.army.airForce.albatross, engine: g.army.airForce.engine },
            units: g.army.units.map(x => ({ name: x.name, commander: x.commander, location: x.location, equipment: x.equipment, troops: x.troops, firepower: x.firepower, morale: x.morale, training: x.training, power: x.power }))
        },
        navy: {
            totalTonnage: g.navy.totalTonnage,
            battleships: g.navy.battleships,
            cruisers: g.navy.cruisers,
            destroyers: g.navy.destroyers,
            submarines: g.navy.submarines,
            summary: g.navy.summary,
            fleets: g.navy.fleets.map(f => ({ name: f.name, flagship: f.flagship, ships: f.ships.map(s => ({ name: s.name, type: s.type, tonnage: s.tonnage, mainGun: s.mainGun, status: s.status })), submarines: f.submarines, cruisers: f.cruisers, destroyers: f.destroyers })),
            antonFleet: g.navy.antonFleet.map(s => ({ name: s.name, type: s.type, status: s.status })),
            building: g.navy.building
        },
        finance: {
            treasury: g.finance.treasury,
            monthlyIncome: g.finance.monthlyIncome,
            monthlyExpense: g.finance.monthlyExpense,
            monthlySurplus: g.finance.monthlySurplus,
            incomeDetails: g.finance.incomeDetails.map(x => ({ name: x.name, amount: x.amount, unit: x.unit, note: x.note })),
            expenseDetails: g.finance.expenseDetails.map(x => ({ name: x.name, amount: x.amount, unit: x.unit, note: x.note })),
            specialExpenses: g.finance.specialExpenses.map(x => ({ name: x.name, amount: x.amount, unit: x.unit || '万两', note: x.note }))
        },
        protectorates: g.protectorates.map(x => ({ name: x.name, fee: x.fee })),
        world: g.world.map(x => ({ name: x.name, status: x.status, details: x.details })),
        projects: g.projects.map(x => ({ name: x.name, start: x.start, expectedEnd: x.expectedEnd, remaining: x.remaining, progress: x.progress, detail: x.detail }))
    };
}

// ============================================================
//  DeepSeek AI推演
// ============================================================
async function runAISimulation(decree, period, apiKey) {
    addLog('🤖 开始DeepSeek AI推演...');

    // 构建精简状态摘要，而非传完整gameData
    const stateSummary = buildStateSummary();
    const stateJSON = JSON.stringify(stateSummary, null, 2);

    const systemPrompt = `你是中华帝国架空历史推演系统的核心引擎。每次推演你都会收到当前帝国的精简状态摘要和陛下指令，你需要推演一个周期后的变化，并以严格的JSON格式返回更新指令。

## 推演规则（必须遵守）：
1. 客观公正：各国均为独立主体，按自身利益行动，中华帝国不以主角光环取胜
2. 数据驱动：所有军事、财政、建设数据必须合理计算，不可随意编造
3. 未完成事项追踪：在建工程、研发项目需更新进度，到期自动完成
4. 博弈多元：需推演德国、英国、日本、美国、法国、俄国等主要国家动向
5. 训练度上限：普通部队≤2.5，装甲部队≤3.0，亮剑方面军≤3.5
6. 战力 = 兵力 × 火力系数 × 士气 × 训练度
7. 财政收支必须合理平衡，不可凭空增收

## 返回JSON格式（关键！）
你返回的JSON是一个"更新指令"，结构是：
{
  "log": "详细的推演叙述（200-800字，描述本周期发生的一切）",
  "date": "推演后的日期（YYYY-MM-DD格式）",
  ...其余字段只写需要变化的部分
}

### 修改已有条目：
直接写目标路径和修改后的值。数组中按name匹配，同名条目会自动合并更新。
例如修改近卫装甲军的训练度：
{ "army": { "units": [ { "name": "近卫装甲军", "training": 2.65 } ] } }
只会更新近卫装甲军的training字段，其余字段不变。

### 新增条目到数组：
在数组中写一个带新name的条目，包含所有必要字段。
例如陛下下令修建高速公路：
{ "internal": { "highways": [ { "name": "南京至上海高速公路", "status": "building", "progress": 0, "detail": "预算5000万两，预计工期2年" } ] } }
这会自动添加到highways数组末尾。

### 新增收入/支出项目：
{ "finance": { "incomeDetails": [ { "name": "钢铁出口关税", "amount": 50, "unit": "万两/月", "note": "新增收入" } ] } }

### 新增项目：
{ "projects": [ { "name": "南京至上海高速公路", "start": "1934-06", "expectedEnd": "1936-06", "remaining": "约2年", "progress": 0, "detail": "预算5000万两" } ] }

### 新增在建舰艇：
{ "navy": { "building": [ { "name": "大唐舰二号", "type": "战列舰", "status": "已开工", "expectedYear": "1937年" } ] } }

### 更新各国动向：
{ "world": [ { "name": "日本", "status": "友好但警惕", "details": ["原敬内阁继续对华友好外交","37mm反坦克炮已列装2个师团","...其余要点"] } ] }
按name匹配，同名国家的details会被整体替换。

### 删除条目：
将条目的特定字段设为 null 可删除该字段。对数组条目没有删除指令，已完成项目(progress=1)保留即可。

### 重要提醒：
- 只返回需要变化的部分！不需要返回未变化的字段
- 数组中的条目必须包含name字段用于匹配
- 新增条目必须包含该数组类型的所有必要字段
- log字段必须包含详细的推演叙述
- date字段必须更新
- 如果陛下指令涉及大额支出，必须在finance.specialExpenses或expenseDetails中体现`;

    const userPrompt = `## 当前帝国状态摘要：
${stateJSON}

## 陛下指令：
${decree}

## 推演周期：
${period === 'half-month' ? '每半月（战时）' : '每三个月（和平）'}

请推演一个周期后的变化，返回JSON更新指令。确保：
1. 所有数值变化合理
2. 新增条目包含完整字段
3. 各国动向需要推演更新
4. log字段写详细的推演叙述（200-800字）
5. date字段更新为推演后日期`;

    try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt }
                ],
                temperature: 0.7,
                max_tokens: 4096
            })
        });

        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API请求失败(${response.status}): ${errText}`);
        }

        const data = await response.json();
        const rawText = data.choices[0].message.content;

        addLog('DeepSeek返回数据，正在解析...');

        // 提取JSON
        const jsonStr = extractJSON(rawText);
        let updateData;
        try {
            updateData = JSON.parse(jsonStr);
        } catch (parseErr) {
            addLog(`JSON解析失败: ${parseErr.message}`, 'error');
            addLog(`原始返回(前500字): ${rawText.substring(0, 500)}`, 'error');
            throw new Error('无法解析AI返回的JSON');
        }

        // 应用更新
        gameData = applyUpdate(gameData, updateData);

        // 日志
        if (updateData.log) {
            // log可能很长，分段添加
            const logText = updateData.log;
            if (logText.length > 500) {
                addLog(logText.substring(0, 500));
                addLog(logText.substring(500, 1000));
                if (logText.length > 1000) addLog(logText.substring(1000));
            } else {
                addLog(logText);
            }
        }

        // 如果updateData中没有date字段，手动推进日期
        if (!updateData.date) {
            advanceDate(period);
        }

        addLog(`✅ AI推演完成，当前日期：${gameData.date}`, 'success');

    } catch (error) {
        addLog(`❌ AI推演失败: ${error.message}`, 'error');
        addLog('切换到本地模拟推演...');
        await runLocalSimulation(decree, period);
    }
}

// 日期推进
function advanceDate(period) {
    const d = new Date(gameData.date);
    if (period === 'half-month') {
        d.setDate(d.getDate() + 15);
    } else {
        d.setMonth(d.getMonth() + 3);
    }
    gameData.date = d.toISOString().split('T')[0];
}

// 添加日志
function addLog(msg, type = 'info') {
    const now = gameData.date || new Date().toISOString().split('T')[0];
    gameData.simulationLog.push({ time: now, msg, type });
    // 同时更新DOM中的日志（如果sim-log存在）
    const logEl = document.getElementById('sim-log');
    if (logEl) {
        const cls = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
        logEl.innerHTML += `<div class="log-entry ${cls}"><span class="timestamp">[${now}]</span> ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }
}

// ============================================================
//  存档 / 读档 / 重置
// ============================================================
const STORAGE_KEY = 'china-empire-game-save';
const DATA_VERSION = 2; // 数据结构版本号，每次大改+1

function saveGame() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameData));
        addLog('💾 游戏已存档', 'success');
    } catch (e) {
        addLog(`存档失败: ${e.message}`, 'error');
    }
}

function loadGame() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) { alert('没有找到存档！'); return; }
        gameData = JSON.parse(saved);
        addLog('📂 存档已加载', 'success');
        renderAllPages();
    } catch (e) {
        alert(`读档失败: ${e.message}`);
    }
}

function resetGame() {
    if (confirm('确定要重置游戏吗？所有进度将丢失！')) {
        localStorage.removeItem(STORAGE_KEY);
        gameData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        renderAllPages();
        addLog('游戏已重置为初始状态', 'success');
    }
}

function toggleAIMode() {
    const apiKey = document.getElementById('api-key').value.trim();
    const modeEl = document.getElementById('ai-mode');
    if (apiKey) {
        modeEl.textContent = 'DeepSeek AI';
        addLog('已切换到DeepSeek AI推演模式');
    } else {
        modeEl.textContent = '本地模拟';
        addLog('已切换到本地模拟推演模式（建议配置API Key）');
    }
}

// ============================================================
//  数据兼容性修复 — 确保存档数据包含所有必要字段
// ============================================================
function ensureDataCompatibility(data) {
    const defaults = JSON.parse(JSON.stringify(DEFAULT_DATA));
    // 用DEFAULT_DATA作为基底，存档数据覆盖上去
    // 这样缺少的字段会自动补上默认值
    const result = applyUpdate(defaults, data);
    // 特别确保关键数组字段存在且是数组
    if (!Array.isArray(result.government)) result.government = defaults.government;
    if (!Array.isArray(result.army?.units)) result.army.units = defaults.army.units;
    if (!Array.isArray(result.navy?.fleets)) result.navy.fleets = defaults.navy.fleets;
    if (!Array.isArray(result.navy?.antonFleet)) result.navy.antonFleet = defaults.navy.antonFleet;
    if (!Array.isArray(result.navy?.building)) result.navy.building = defaults.navy.building;
    if (!Array.isArray(result.finance?.incomeDetails)) result.finance.incomeDetails = defaults.finance.incomeDetails;
    if (!Array.isArray(result.finance?.expenseDetails)) result.finance.expenseDetails = defaults.finance.expenseDetails;
    if (!Array.isArray(result.finance?.specialExpenses)) result.finance.specialExpenses = [];
    if (!Array.isArray(result.protectorates)) result.protectorates = defaults.protectorates;
    if (!Array.isArray(result.world)) result.world = defaults.world;
    if (!Array.isArray(result.projects)) result.projects = defaults.projects;
    if (!Array.isArray(result.simulationLog)) result.simulationLog = [{ time: result.date, msg: '游戏初始化完成', type: 'info' }];
    if (!Array.isArray(result.internal?.railways)) result.internal.railways = defaults.internal.railways;
    if (!Array.isArray(result.internal?.highways)) result.internal.highways = [];
    return result;
}

// ============================================================
//  初始化
// ============================================================
(function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const raw = JSON.parse(saved);
            // 版本号检查：如果存档版本和当前版本不匹配，直接用默认数据
            if (!raw._version || raw._version < DATA_VERSION) {
                console.warn(`存档版本(${raw._version || '未知'})与当前版本(${DATA_VERSION})不匹配，重置为默认数据`);
                localStorage.removeItem(STORAGE_KEY);
                gameData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            } else {
                gameData = ensureDataCompatibility(raw);
                console.log('从存档加载游戏数据（已做兼容性修复）');
                localStorage.setItem(STORAGE_KEY, JSON.stringify(gameData));
            }
        } catch (e) {
            console.warn('存档解析失败，使用默认数据:', e);
            localStorage.removeItem(STORAGE_KEY);
            gameData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        }
    } else {
        gameData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
    renderAllPages();
})();
